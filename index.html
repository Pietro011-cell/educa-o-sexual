<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Agente Infiltrado Online</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;

/* degradê vertical com transição suave */
background: linear-gradient(
  to bottom,
  #faf6f7 0%,
  #bdbbbb 35%,
  #373a3b 65%,
  #1c1f25 100%
);

display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.card{
background:;
max-width:500px;
margin:30px auto;
padding:20px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
padding:10px 15px;
margin:8px;
border:none;
border-radius:8px;
background:#3498db;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

.timer{
font-size:28px;
font-weight:bold;
color:#c0392b;
}
</style>
</head>

<body>

<div class="card">
<h1>Agente Infiltrado</h1>

<div id="tela"></div>
<div class="timer" id="timer"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// 🔴 COLE A CONFIG DO FIREBASE AQUI
const firebaseConfig = {
  apiKey: "AIzaSyDRoOF-TspNa6yG8a3kR40anwv_Ttyx0Xk",
  authDomain: "jogo-impostor-f3ce6.firebaseapp.com",
  projectId: "jogo-impostor-f3ce6",
  storageBucket: "jogo-impostor-f3ce6.firebasestorage.app",
  messagingSenderId: "523544579920",
  appId: "1:523544579920:web:be686658a613119a38e655"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ================= BANCO =================
const rodadas = [
{
tema:"Métodos Contraceptivos",
palavras:["DIU","Camisinha","Implante","Pílula","DIU Hormonal"]
},
{
tema:"ISTs",
palavras:["HIV","Sífilis","HPV","Gonorreia","Clamídia"]
},
{
tema:"Puberdade",
palavras:["Acne","Menstruação","Pelos","Voz","Mamas"]
}
];

// ================= VARIÁVEIS =================
let sala = "";
let nome = "";
let papel = "";
let infiltrado = false;
let tempo = 180;
let rodada = 0;

// ================= ENTRAR =================
function entrar(){
document.getElementById("tela").innerHTML = `
<h2>Entrar na sala</h2>

<input id="nome" placeholder="Seu nome"><br><br>
<input id="sala" placeholder="Código da sala"><br><br>

<button onclick="iniciar()">Entrar</button>
`;
}

// ================= INICIAR =================
function iniciar(){

nome = document.getElementById("nome").value;
sala = document.getElementById("sala").value;

sortearPapel();
mostrar();
cronometro();
}

// ================= SORTEIO =================
function sortearPapel(){

const r = rodadas[rodada];

if(Math.random() < 0.2){
papel = "INFILTRADO";
infiltrado = true;
}else{
papel = r.palavras[
Math.floor(Math.random()*r.palavras.length)
];
infiltrado = false;
}

// SALVA NO FIREBASE
db.collection("salas")
.doc(sala)
.collection("jogadores")
.doc(nome)
.set({
nome,
papel,
infiltrado
});
}

// ================= TELA =================
function mostrar(){

document.getElementById("tela").innerHTML = `
<h2>Rodada ${rodada+1}</h2>
<h3>${rodadas[rodada].tema}</h3>

<hr>

<h2>${nome}</h2>

<p style="font-size:24px">${papel}</p>

<p>${infiltrado ?
"Você é o INFILTRADO"
:
"Descubra quem é o infiltrado"
}</p>

<button onclick="votar()">Ir para votação</button>
`;
}

// ================= TIMER =================
function cronometro(){

tempo = 180;

let t = setInterval(()=>{

tempo--;

let m = Math.floor(tempo/60);
let s = tempo%60;

document.getElementById("timer").innerHTML =
`${m}:${s.toString().padStart(2,"0")}`;

if(tempo<=0){
clearInterval(t);
mostrarVotacao();
}

},1000);
}

// ================= VOTAÇÃO =================
function votar(){

db.collection("salas")
.doc(sala)
.collection("votos")
.add({
votante:nome,
voto:""
});

document.getElementById("tela").innerHTML = `
<h2>Votação</h2>

<input id="voto" placeholder="Nome do suspeito"><br><br>

<button onclick="enviarVoto()">Votar</button>
<button onclick="verResultado()">Ver resultado</button>
`;
}


function enviarVoto(){

const voto = document.getElementById("voto").value;

db.collection("salas")
.doc(sala)
.collection("votos")
.add({
votante:nome,
voto:voto
});

alert("Voto enviado!");
}

// ================= RESULTADO REAL =================
async function verResultado(){

const snap = await db.collection("salas")
.doc(sala)
.collection("votos")
.get();

let contagem = {};

snap.forEach(doc=>{
let v = doc.data().voto;
contagem[v] = (contagem[v]||0)+1;
});

let vencedor = Object.keys(contagem)
.reduce((a,b)=>
contagem[a] > contagem[b] ? a : b
);

document.getElementById("tela").innerHTML = `
<h2>Resultado Final</h2>
<p>Mais votado: <b>${vencedor}</b></p>
<button onclick="location.reload()">Nova rodada</button>
`;
}

// START
entrar();

</script>

</body>
</html>
